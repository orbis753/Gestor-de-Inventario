<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MercaFácil — Movimientos de Inventario</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#071226;
    --bg-1:#0b1724;
    --card:#0b1320;
    --accent:#00bcd4;
    --accent-2:#4fe6e9;
    --muted:#94a3b8;
    --border:rgba(255,255,255,0.04);
    font-family:"Inter",system-ui;
  }
  body{margin:0;background:linear-gradient(180deg,var(--bg-0),#06121a);color:#e6eef8;font-size:14px}
  .app{display:flex;min-height:100vh}
  .sidebar{width:220px;background:linear-gradient(180deg,var(--bg-1),#061226);padding:22px 16px;border-right:1px solid var(--border)}
  .brand{font-weight:800;color:var(--accent);font-size:18px;margin-bottom:16px}
  .menu{list-style:none;padding:0;margin:0}
  .menu li{padding:8px 10px;border-radius:8px;color:var(--muted);cursor:pointer}
  .menu li.active{background:rgba(0,188,212,0.06);color:#fff}
  .main{flex:1;padding:28px;display:flex;flex-direction:column;gap:18px}
  .header{display:flex;justify-content:space-between;align-items:center}
  .title{font-size:20px;font-weight:700}
  .subtitle{color:var(--muted);font-size:13px}
  .content{display:flex;gap:18px}
  .left{flex:1;display:flex;flex-direction:column;gap:12px}
  .card{background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));padding:18px;border-radius:12px;border:1px solid var(--border)}
  h3{margin:0 0 10px 0;font-size:16px}
  label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
  input,select{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,0.02);color:#fff}
  .row{display:flex;gap:12px}
  .col{flex:1}
  .btn{padding:10px 14px;border-radius:8px;cursor:pointer;font-weight:600;border:0}
  .btn-primary{background:linear-gradient(90deg,var(--accent),var(--accent-2));color:#071226}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:#fff}
  .history{display:flex;flex-direction:column;gap:8px}
  .item{padding:10px;border-radius:8px;background:rgba(255,255,255,0.01);border:1px solid var(--border);display:flex;justify-content:space-between}
  .muted{color:var(--muted);font-size:13px}
  .stats{display:flex;gap:12px}
  .stat{flex:1;padding:12px;border-radius:10px;background:rgba(255,255,255,0.02);text-align:center}
  .stat .num{font-size:18px;font-weight:800}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">MercaFácil</div>
    <ul class="menu">
      <li>Inicio</li>
      <li>Productos</li>
      <li>Almacenamientos</li>
      <li class="active">Movimientos</li>
    </ul>
  </aside>
  <main class="main">
    <div class="header">
      <div>
        <div class="title">Movimientos de Inventario</div>
        <div class="subtitle">Registra entradas, salidas y ajustes</div>
      </div>
      <div style="text-align:right">
        <div class="muted">Usuario</div>
        <div style="font-weight:700">Christopher</div>
      </div>
    </div>
    <div class="content">
      <div class="left">
        <div class="card">
          <h3>Registrar movimiento</h3>
          <div class="row">
            <div class="col">
              <label>Tipo</label>
              <select id="type"><option>Entrada</option><option>Salida</option><option>Ajuste</option></select>
            </div>
            <div class="col">
              <label>Producto</label>
              <select id="product"><option>Laptop HP</option><option>Aceite 1L</option><option>Taladro 500W</option></select>
            </div>
            <div class="col">
              <label>Cantidad</label>
              <input id="qty" type="number" min="1" value="1"/>
            </div>
          </div>
          <div class="row" style="margin-top:10px">
            <div class="col">
              <label>Almacén origen</label>
              <select id="from"><option>Almacén Central</option><option>Sucursal Norte</option></select>
            </div>
            <div class="col">
              <label>Almacén destino</label>
              <select id="to"><option>Almacén Central</option><option>Sucursal Sur</option></select>
            </div>
            <div class="col">
              <label>Motivo</label>
              <input id="reason" type="text" placeholder="Compra, venta, ajuste..."/>
            </div>
          </div>
          <div style="margin-top:10px">
            <label>Fecha</label>
            <input id="date" type="date"/>
          </div>
          <div style="margin-top:12px;text-align:right">
            <button class="btn btn-ghost">Cancelar</button>
            <button class="btn btn-primary" id="register">Registrar movimiento</button>
          </div>
        </div>
        <div class="card">
          <h3>Historial de movimientos</h3>
          <div class="history" id="history"></div>
        </div>
      </div>
      <aside style="width:300px;display:flex;flex-direction:column;gap:12px">
        <div class="card">
          <h3>Estadísticas rápidas</h3>
          <div class="stats">
            <div class="stat"><div class="num" id="entradas">0</div><div class="muted">Entradas</div></div>
            <div class="stat"><div class="num" id="salidas">0</div><div class="muted">Salidas</div></div>
            <div class="stat"><div class="num" id="ajustes">0</div><div class="muted">Ajustes</div></div>
          </div>
        </div>
      </aside>
    </div>
  </main>
</div>
<script>
  const history = document.getElementById('history');
  const entradas = document.getElementById('entradas');
  const salidas = document.getElementById('salidas');
  const ajustes = document.getElementById('ajustes');
  let counts={Entrada:0,Salida:0,Ajuste:0};
  document.getElementById('register').addEventListener('click',()=>{
    const type=document.getElementById('type').value;
    const prod=document.getElementById('product').value;
    const qty=document.getElementById('qty').value;
    const from=document.getElementById('from').value;
    const to=document.getElementById('to').value;
    const reason=document.getElementById('reason').value;
    const date=document.getElementById('date').value;
    const item=document.createElement('div');
    item.className='item';
    item.innerHTML=`<div><strong>${prod}</strong><div class="muted">${type} · ${qty} unidades · ${from} → ${to} · ${reason}</div></div><div class="muted">${date||'hoy'}</div>`;
    history.prepend(item);
    counts[type]++; entradas.textContent=counts['Entrada']; salidas.textContent=counts['Salida']; ajustes.textContent=counts['Ajuste'];
  });
</script>
</body>
</html>
