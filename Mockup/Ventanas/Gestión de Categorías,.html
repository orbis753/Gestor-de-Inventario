<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MercaFácil — Gestión de Categorías</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#071226; --bg-1:#0b1724; --card:#0b1320;
    --accent:#00bcd4; --accent-2:#4fe6e9;
    --muted:#94a3b8; --border:rgba(255,255,255,0.04);
    font-family:"Inter",system-ui;
  }
  body{margin:0;background:linear-gradient(180deg,var(--bg-0),#06121a);color:#e6eef8;font-size:14px}
  .app{display:flex;min-height:100vh}
  .sidebar{width:220px;background:linear-gradient(180deg,var(--bg-1),#061226);padding:22px 16px;border-right:1px solid var(--border)}
  .brand{font-weight:800;color:var(--accent);font-size:18px;margin-bottom:16px}
  .menu{list-style:none;padding:0;margin:0}
  .menu li{padding:8px 10px;border-radius:8px;color:var(--muted);cursor:pointer}
  .menu li.active{background:rgba(0,188,212,0.06);color:#fff}
  .main{flex:1;padding:28px;display:flex;flex-direction:column;gap:18px}
  .header{display:flex;justify-content:space-between;align-items:center}
  .title{font-size:20px;font-weight:700}
  .subtitle{color:var(--muted);font-size:13px}
  .content{display:flex;gap:18px}
  .left{flex:1;display:flex;flex-direction:column;gap:12px}
  .card{background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));padding:18px;border-radius:12px;border:1px solid var(--border)}
  h3{margin:0 0 10px 0;font-size:16px}
  label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
  input,select{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,0.02);color:#fff}
  .row{display:flex;gap:12px}
  .col{flex:1}
  .btn{padding:10px 14px;border-radius:8px;cursor:pointer;font-weight:600;border:0}
  .btn-primary{background:linear-gradient(90deg,var(--accent),var(--accent-2));color:#071226}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:#fff}
  .list{display:flex;flex-direction:column;gap:8px}
  .item{padding:10px;border-radius:8px;background:rgba(255,255,255,0.01);border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .muted{color:var(--muted);font-size:13px}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">MercaFácil</div>
    <ul class="menu">
      <li>Inicio</li>
      <li>Productos</li>
      <li>Almacenamientos</li>
      <li>Movimientos</li>
      <li class="active">Categorías</li>
    </ul>
  </aside>
  <main class="main">
    <div class="header">
      <div>
        <div class="title">Gestión de Categorías</div>
        <div class="subtitle">Crea, edita y organiza categorías y subcategorías</div>
      </div>
      <div style="text-align:right">
        <div class="muted">Usuario</div>
        <div style="font-weight:700">Christopher</div>
      </div>
    </div>
    <div class="content">
      <div class="left">
        <div class="card">
          <h3>Nueva categoría</h3>
          <div class="row">
            <div class="col">
              <label>Nombre</label>
              <input id="catName" type="text" placeholder="Ej. Tecnología"/>
            </div>
            <div class="col">
              <label>Descripción</label>
              <input id="catDesc" type="text" placeholder="Breve descripción"/>
            </div>
          </div>
          <div style="margin-top:12px;text-align:right">
            <button class="btn btn-ghost">Cancelar</button>
            <button class="btn btn-primary" id="addCat">Agregar categoría</button>
          </div>
        </div>
        <div class="card">
          <h3>Categorías existentes</h3>
          <div class="list" id="catList"></div>
        </div>
      </div>
      <aside style="width:300px;display:flex;flex-direction:column;gap:12px">
        <div class="card">
          <h3>Subcategorías</h3>
          <label>Selecciona categoría</label>
          <select id="selCat"></select>
          <label style="margin-top:8px">Nombre subcategoría</label>
          <input id="subName" type="text" placeholder="Ej. Laptops"/>
          <div style="margin-top:12px;text-align:right">
            <button class="btn btn-primary" id="addSub">Agregar subcategoría</button>
          </div>
          <div class="list" id="subList" style="margin-top:12px"></div>
        </div>
      </aside>
    </div>
  </main>
</div>
<script>
  const catList=document.getElementById('catList');
  const selCat=document.getElementById('selCat');
  const subList=document.getElementById('subList');
  const cats={};

  document.getElementById('addCat').addEventListener('click',()=>{
    const name=document.getElementById('catName').value.trim();
    const desc=document.getElementById('catDesc').value.trim();
    if(!name) return;
    cats[name]=[];
    const item=document.createElement('div');
    item.className='item';
    item.innerHTML=`<div><strong>${name}</strong><div class="muted">${desc}</div></div><button class="btn btn-ghost btn-sm" onclick="removeCat('${name}')">Eliminar</button>`;
    catList.appendChild(item);
    const opt=document.createElement('option'); opt.value=name; opt.textContent=name; selCat.appendChild(opt);
    document.getElementById('catName').value=''; document.getElementById('catDesc').value='';
  });

  function removeCat(name){
    delete cats[name];
    [...catList.children].forEach(c=>{if(c.innerText.includes(name)) c.remove();});
    [...selCat.options].forEach(o=>{if(o.value===name) o.remove();});
    subList.innerHTML='';
  }

  document.getElementById('addSub').addEventListener('click',()=>{
    const cat=selCat.value;
    const sub=document.getElementById('subName').value.trim();
    if(!cat||!sub) return;
    cats[cat].push(sub);
    const item=document.createElement('div');
    item.className='item';
    item.innerHTML=`<div>${sub}</div><button class="btn btn-ghost btn-sm" onclick="removeSub('${cat}','${sub}')">Eliminar</button>`;
    subList.appendChild(item);
    document.getElementById('subName').value='';
  });

  function removeSub(cat,sub){
    cats[cat]=cats[cat].filter(s=>s!==sub);
    [...subList.children].forEach(c=>{if(c.innerText.includes(sub)) c.remove();});
  }
</script>
</body>
</html>
